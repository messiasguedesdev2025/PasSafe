spring:
  application:
    name: passafe
  datasource:
    url: jdbc:postgresql://localhost:5432/passafe_db
    username: seu_usuario
    password: sua_senha
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect