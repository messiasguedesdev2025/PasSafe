spring:
  application:
    name: passafe

  datasource:
    # Ajuste para SQL Server (SQL Express)
    url: jdbc:sqlserver://localhost:1433;databaseName=passafe;encrypt=true;trustServerCertificate=true
    username: sa
    password: SUASENHA_AQUI
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

# Configurações de Cibersegurança do PasSafe
passafe:
  # Chave AES-256 para as senhas no banco (32 caracteres)
  encryption:
    key: ${PASSAFE_SECRET_KEY:12345678901234567890123456789012}
  # Chave JWT para autenticação no login (mínimo 64 caracteres)
  jwt:
    secret: 1234567890123456789012345678901212345678901234567890123456789012
